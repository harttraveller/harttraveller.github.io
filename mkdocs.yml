site_name: Hart Traveller
docs_dir: yield/pages
repo_name: harttraveller.github.io
site_url: https://harttraveller.com
repo_url: https://github.com/harttraveller/harttraveller.github.io
edit_uri: edit/main/main/


nav:
- index.md

theme:
  name: material
  favicon: icon.png
  logo: icon.png
  logo_url: "/"
  logo_tooltip: ""
  custom_dir: yield/pages/static/custom
  icon:
    annotation: material/plus-circle
  font:
    text: Inter
    code: Ubuntu Mono
  palette:
    scheme: slate
    primary: black
    accent: orange
  features:
  # - content.action.view
  - search.suggest
  - content.code.copy
  - content.code.annotate
  - navigation.tracking
  - navigation.tabs
  - navigation.tabs.sticky

plugins:
- search
- meta
# - tags:
#     tags_file: tags.md
- obsidian-bridge
- mkdocs-jupyter
- git-revision-date-localized:
    enable_creation_date: true
- blog:
    blog_dir: page
    blog_toc: true
    post_url_format: "{categories}/{slug}"
    categories_url_format: "{slug}"
    pagination_per_page: 8
- rss:
    match_path: posts/.*
    comments_path: "#__comments"
    date_from_meta:
      as_creation: date
    categories:
    - categories
# - roamlinks
# - embed_file


markdown_extensions:
- attr_list
- md_in_html
- admonition
- footnotes
- pymdownx.critic
- pymdownx.caret
- pymdownx.keys
- pymdownx.mark
- pymdownx.tilde
- pymdownx.details
- pymdownx.inlinehilite
- pymdownx.snippets
- pymdownx.superfences
- pymdownx.highlight:
    anchor_linenums: true
    use_pygments: true
- pymdownx.tasklist:
    custom_checkbox: true
- pymdownx.tabbed:
    alternate_style: true
- pymdownx.highlight:
    anchor_linenums: true
    use_pygments: true
- pymdownx.tasklist:
    custom_checkbox: true
- pymdownx.arithmatex:
    generic: true
- pymdownx.superfences:
    custom_fences:
    - name: mermaid
      class: mermaid
      format: !!python/name:pymdownx.superfences.fence_code_format

