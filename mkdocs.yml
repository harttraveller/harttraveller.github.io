site_name: Hart Traveller
docs_dir: main
repo_name: harttraveller.github.io
site_url: https://harttraveller.com
repo_url: https://github.com/harttraveller/harttraveller.github.io

nav:
- index.md

theme:
  name: material
  favicon: icon.png
  logo: icon.png
  logo_url: "/"
  logo_tooltip: ""
  custom_dir: main/site
  icon:
    annotation: material/plus-circle
  font:
    text: Inter
    code: Ubuntu Mono
  palette:
    scheme: slate
    primary: black
    accent: orange
  features:
  - search.suggest
  - content.code.copy
  - content.code.annotate
  - navigation.tracking
  - navigation.footer
  - navigation.tabs
  - navigation.tabs.sticky

plugins:
- search
- roamlinks
# - embed_file
# - mkdocs-jupyter
# - tags:
#     tags_file: projects/tags.md
# - blog:
#     blog_dir: projects
#     post_url_date_format: yyyy/MM/dd
#     post_date_format: long
#     draft_if_future_date: true
#     categories_name: Type
#     archive_name: Year

markdown_extensions:
- attr_list
- md_in_html
- admonition
- footnotes
- pymdownx.critic
- pymdownx.caret
- pymdownx.keys
- pymdownx.mark
- pymdownx.tilde
- pymdownx.details
- pymdownx.inlinehilite
- pymdownx.snippets
- pymdownx.superfences
- pymdownx.highlight:
    anchor_linenums: true
    use_pygments: true
- pymdownx.tasklist:
    custom_checkbox: true
- pymdownx.tabbed:
    alternate_style: true
- pymdownx.highlight:
    anchor_linenums: true
    use_pygments: true
- pymdownx.tasklist:
    custom_checkbox: true
- pymdownx.arithmatex:
    generic: true
- pymdownx.emoji:
    emoji_index: !!python/name:materialx.emoji.twemoji
    emoji_generator: !!python/name:materialx.emoji.to_svg
- pymdownx.superfences:
    custom_fences:
    - name: mermaid
      class: mermaid
      format: !!python/name:pymdownx.superfences.fence_code_format

extra:
  generator: false
  quicklinks:
  - name: GitHub
    info: GitHub
    icon: lucide/github
    link: https://github.com/harttraveller
    # - name: GitLab
    #   info: GitLab Profile
    #   icon: lucide/gitlab
    #   link: https://www.gitlab.com/harttraveller
    # - name: LinkedIn Profile
    #   info: LinkedIn
    #   icon: lucide/linkedin
    #   link: https://www.linkedin.com/in/harttraveller/

extra_css:
- static/styles/global.admonition.css
- static/styles/global.notebook.css
- static/styles/global.theme.css
- static/styles/max.theme.css
- static/styles/med.theme.css
- static/styles/min.theme.css
- static/styles/testing.css

extra_javascript:
- static/script/quicklink.js
- static/script/search.js
- static/script/mathjax.js
- https://polyfill.io/v3/polyfill.min.js?features=es6
- https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
# - static/script/tabs.js
# - static/script/video.js
# - static/script/video-test.js


