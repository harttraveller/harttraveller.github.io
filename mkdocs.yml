site_name: Hart Traveller

plugins:
- search

theme:
  name: material
  logo: assets/profile.png
  favicon: assets/profile.png
  icon:
    repo: fontawesome/brands/github
  palette:
    scheme: slate
    primary: black
    accent: orange
  features:
    - header.autohide
    - navigation.instant
    - navigation.tracking
    - content.code.copy
    - navigation.tabs
    - navigation.footer

extra:
  generator: false

extra_css:
- stylesheets/extra.css

markdown_extensions:
- md_in_html
- admonition
- attr_list
- pymdownx.details
- pymdownx.inlinehilite
- pymdownx.snippets
- pymdownx.superfences
- pymdownx.highlight:
    anchor_linenums: true
    use_pygments: true
- pymdownx.tasklist:
    custom_checkbox: true
- pymdownx.tabbed:
    alternate_style: true

nav:
- Home: "index.md"
# - Projects: "projects.md"
- Resume: "resume.md"
# - Links: "links.md"
- Contact: "contact.md"