site_name: Hart Traveller
docs_dir: site
repo_name: harttraveller.github.io
site_url: https://harttraveller.com
repo_url: https://github.com/harttraveller/harttraveller.github.io

nav:
- index.md

theme:
  name: material
  favicon: icon.png
  logo: icon.png
  logo_url: "/"
  logo_tooltip: ""
  custom_dir: site/static/custom
  icon:
    annotation: material/plus-circle
  font:
    text: Inter
    code: Ubuntu Mono
  palette:
    scheme: slate
    primary: black
    accent: orange
  features:
  - search.suggest
  - content.code.copy
  - content.code.annotate
  - navigation.tracking
  # - navigation.footer
  # - navigation.tabs
  # - navigation.tabs.sticky

plugins:
- search
- obsidian-bridge
- mkdocs-jupyter
- blog:
    blog_dir: .
    blog_toc: true
    post_url_format: "{slug}"
- rss:
    match_path: posts/.*
    comments_path: "#__comments"
    date_from_meta:
      as_creation: date
    categories:
    - categories
#     enabled: true
#     feed_ttl: 1440
#     image: https://upload.wikimedia.org/wikipedia/commons/thumb/4/43/Feed-icon.svg/128px-Feed-icon.svg.png
# url_parameters:
#   utm_source: "documentation"
#   utm_medium: "RSS"
# utm_campaign: "feed-syndication"

# - roamlinks
# - embed_file
# - tags:
#     tags_file: projects/tags.md
# - blog:
#     blog_dir: projects
#     post_url_date_format: yyyy/MM/dd
#     post_date_format: long
#     draft_if_future_date: true
#     categories_name: Type
#     archive_name: Year

markdown_extensions:
- attr_list
- md_in_html
- admonition
- footnotes
- pymdownx.critic
- pymdownx.caret
- pymdownx.keys
- pymdownx.mark
- pymdownx.tilde
- pymdownx.details
- pymdownx.inlinehilite
- pymdownx.snippets
- pymdownx.superfences
- pymdownx.highlight:
    anchor_linenums: true
    use_pygments: true
- pymdownx.tasklist:
    custom_checkbox: true
- pymdownx.tabbed:
    alternate_style: true
- pymdownx.highlight:
    anchor_linenums: true
    use_pygments: true
- pymdownx.tasklist:
    custom_checkbox: true
- pymdownx.arithmatex:
    generic: true
- pymdownx.superfences:
    custom_fences:
    - name: mermaid
      class: mermaid
      format: !!python/name:pymdownx.superfences.fence_code_format
# - pymdownx.emoji:
#     emoji_index: !!python/name:materialx.emoji.twemoji
#     emoji_generator: !!python/name:materialx.emoji.to_svg

