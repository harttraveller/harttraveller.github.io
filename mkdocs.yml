site_name: Hart Traveller
docs_dir: main
repo_name: harttraveller.github.io
site_url: https://harttraveller.com
repo_url: https://github.com/harttraveller/harttraveller.github.io

nav:
- index.md


plugins:
- search
- roamlinks
# - embed_file
# - mkdocs-jupyter
# - tags:
#     tags_file: projects/tags.md
# - blog:
#     blog_dir: projects
#     post_url_date_format: yyyy/MM/dd
#     post_date_format: long
#     draft_if_future_date: true
#     categories_name: Type
#     archive_name: Year


theme:
  name: material
  font:
    text: Inter
    code: Ubuntu Mono
  custom_dir: site/file/static/custom
  logo: file/assets/profile.png
  favicon: assets/site/profile.png
  icon:
    repo: fontawesome/brands/github
  palette:
    scheme: slate
    primary: black
    accent: orange
  features:
  - navigation.instant
  - navigation.tracking
  - content.code.copy
  - navigation.tabs
  - navigation.tabs.sticky
  - navigation.footer

extra:
  generator: false
  quicklinks:
  - name: GitHub
    info: GitHub
    icon: lucide/github
    link: https://github.com/harttraveller
    # - name: GitLab
    #   info: GitLab Profile
    #   icon: lucide/gitlab
    #   link: https://www.gitlab.com/harttraveller
    # - name: LinkedIn Profile
    #   info: LinkedIn
    #   icon: lucide/linkedin
    #   link: https://www.linkedin.com/in/harttraveller/

extra_css:
- stylesheets/extra.css

extra_javascript:
- "javascripts/extra.js"

markdown_extensions:
- attr_list
- md_in_html
- admonition
- footnotes
- pymdownx.critic
- pymdownx.caret
- pymdownx.keys
- pymdownx.mark
- pymdownx.tilde
- pymdownx.details
- pymdownx.inlinehilite
- pymdownx.snippets
- pymdownx.superfences
- pymdownx.highlight:
    anchor_linenums: true
    use_pygments: true
- pymdownx.tasklist:
    custom_checkbox: true
- pymdownx.tabbed:
    alternate_style: true
- pymdownx.highlight:
    anchor_linenums: true
    use_pygments: true
- pymdownx.tasklist:
    custom_checkbox: true
- pymdownx.arithmatex:
    generic: true
- pymdownx.emoji:
    emoji_index: !!python/name:materialx.emoji.twemoji
    emoji_generator: !!python/name:materialx.emoji.to_svg
- pymdownx.superfences:
    custom_fences:
    - name: mermaid
      class: mermaid
      format: !!python/name:pymdownx.superfences.fence_code_format
