site_name: Hart Traveller
docs_dir: main
repo_name: harttraveller.github.io
site_url: https://harttraveller.com
repo_url: https://github.com/harttraveller/harttraveller.github.io

nav:
- index.md

theme:
  name: material
  favicon: icon.png
  logo: icon.png
  logo_url: "/"
  logo_tooltip: ""
  custom_dir: main/config/custom
  icon:
    annotation: material/plus-circle
  font:
    text: Inter
    code: Ubuntu Mono
  palette:
    scheme: slate
    primary: black
    accent: orange
  features:
  - search.suggest
  - content.code.copy
  - content.code.annotate
  - navigation.tracking
  # - navigation.footer
  # - navigation.tabs
  # - navigation.tabs.sticky

plugins:
- search
- obsidian-bridge
- blog:
    blog_dir: .
    blog_toc: true
    post_url_format: "{slug}"
