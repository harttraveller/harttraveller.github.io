site_name: Portfolio Site

theme:
    name: material
    custom_dir: overrides
    logo: assets/faceless_edit.png
    favicon: assets/faceless_edit.png
    palette:
        scheme: slate
        primary: black
        accent: orange
    features:
        - header.autohide
        - navigation.instant
        - navigation.tracking
        - navigation.tabs
        - navigation.tabs.sticky

markdown_extensions:
    - admonition
    - md_in_html
    - pymdownx.details
    - pymdownx.highlight
    - pymdownx.inlinehilite

nav:
    - Home: "index.md"
    #   - Company:
    #       - Overview: "pages/company/overview.md"
    - Projects:
          - Projects Overview: "pages/projects/overview.md"
          # - Personal:
          # - Collaborative:
          # - Contribution:
          # - School:
    # - Research:
    #       - Overview: "pages/research/overview.md"
    - Organizations:
          - Organizations Overview: "pages/organizations/overview.md"
    # - Music:
    #       - Music Overview: "pages/music/overview.md"
    # - Resume:
    #       - Resume Overview: "pages/resume/overview.md"
    #       - Bio: "pages/other/bio.md"
    - Contact: "contact.md"
