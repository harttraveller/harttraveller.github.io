[tool.poetry]
name = "harttraveller.github.io"
version = "0.1.0"
description = "Personal website."
readme = "README.md"
repository = "https://github.com/harttraveller.github.io"
authors = ["Hart Traveller <hexes.town.0y@icloud.com>"]
maintainers = ["Hart Traveller <hexes.town.0y@icloud.com>"]

[tool.poetry.dependencies]
python = ">=3.10, <4.0"
mkdocs-material = { git = "https://github.com/squidfunk/mkdocs-material-insiders.git", branch = "master" }
mkdocs-glightbox = "^0.3.4"
# mkdocs-click = "^0.8.1"
# mkdocstrings = "^0.23.0"
# mkdocs-jupyter = "^0.24.5"
# mkdocs-material-extensions = "^1.3"
# pymdown-extensions = "^10.3.1"

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"

[[tool.poetry.source]]
name = "PyPI"
priority = "primary"
